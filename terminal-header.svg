<svg width="800" height="180" viewBox="0 0 800 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mono { font-family: 'Courier New', Courier, monospace; }
      .l1 { opacity: 0; animation: appear 0.1s forwards 0.4s; }
      .l2 { opacity: 0; animation: appear 0.1s forwards 1.2s; }
      .l3 { opacity: 0; animation: appear 0.1s forwards 2.0s; }
      .l4 { opacity: 0; animation: appear 0.1s forwards 2.8s; }
      .cur { animation: blink 1s step-end infinite 2.8s; opacity: 0; }
      .scanline {
        stroke-dasharray: 800;
        stroke-dashoffset: 800;
        animation: scan 0.9s ease forwards 3.4s;
      }
      @keyframes appear { to { opacity: 1; } }
      @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
      @keyframes scan { to { stroke-dashoffset: 0; } }
    </style>
  </defs>

  <!-- Black terminal background -->
  <rect width="800" height="180" fill="#0a0d0a" rx="10"/>

  <!-- Top bar -->
  <rect width="800" height="36" fill="#111611" rx="10"/>
  <rect y="20" width="800" height="16" fill="#111611"/>

  <!-- Traffic light dots -->
  <circle cx="22" cy="18" r="5.5" fill="#ff5f56"/>
  <circle cx="40" cy="18" r="5.5" fill="#ffbd2e"/>
  <circle cx="58" cy="18" r="5.5" fill="#27c93f"/>

  <!-- Window title -->
  <text x="400" y="23" text-anchor="middle" fill="#3a4a3a" font-size="11" class="mono" letter-spacing="1">akashpshaw524 — profile.md</text>

  <!-- Line 1: command -->
  <text x="48" y="72" font-size="13" class="mono l1">
    <tspan fill="#3fb950">$</tspan>
    <tspan fill="#8b949e"> loading </tspan>
    <tspan fill="#58a6ff">analyst.profile</tspan>
    <tspan fill="#8b949e"> --verbose</tspan>
  </text>

  <!-- Line 2 -->
  <text x="48" y="100" fill="#3fb950" font-size="13" class="mono l2">&#x2713;  10 yrs Business Development experience  ...  indexed</text>

  <!-- Line 3 -->
  <text x="48" y="128" fill="#3fb950" font-size="13" class="mono l3">&#x2713;  SQL &#xB7; Python &#xB7; Power BI  ...  loaded</text>

  <!-- Line 4: prompt -->
  <text x="48" y="156" font-size="13" class="mono l4">
    <tspan fill="#2d5a3d">ready</tspan>
    <tspan fill="#3fb950"> _</tspan>
    <tspan class="cur" fill="#3fb950">&#x2588;</tspan>
  </text>

  <!-- Animated scan line at bottom -->
  <line x1="0" y1="172" x2="800" y2="172" stroke="#3fb950" stroke-width="1.5" class="scanline"/>
</svg>
